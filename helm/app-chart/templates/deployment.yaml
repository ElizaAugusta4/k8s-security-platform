apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.name }}
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
      {{- $annotations := dict }}
      {{- if .Values.vault.enabled }}
        {{- $vaultAnnotations := dict
          "vault.hashicorp.com/agent-inject" "true"
          "vault.hashicorp.com/role" .Values.vault.role
          "vault.hashicorp.com/agent-pre-populate-only" "false"
        }}
        {{- range .Values.vault.secrets }}
          {{- $_ := set $vaultAnnotations (printf "vault.hashicorp.com/agent-inject-secret-%s" .name) .path }}
          {{- if .template }}
            {{- $_ := set $vaultAnnotations (printf "vault.hashicorp.com/agent-inject-template-%s" .name) .template }}
          {{- end }}
        {{- end }}
        {{- $annotations = merge $annotations $vaultAnnotations }}
      {{- end }}
      {{- if $annotations }}
      annotations:
        {{- toYaml $annotations | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
      containers:
        - name: {{ .Values.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
          resources: {{ toYaml .Values.resources | nindent 12 }}