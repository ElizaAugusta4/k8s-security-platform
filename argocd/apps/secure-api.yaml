apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secure-api
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/ElizaAugusta4/k8s-security-platform.git
    targetRevision: main
    path: helm/app-chart
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true