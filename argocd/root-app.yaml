# argocd/root-app.yaml
# Ponto de entrada do GitOps — uma única Application que gerencia todas as outras
# kubectl apply -f argocd/root-app.yaml é o único comando manual necessário

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ElizaAugusta4/k8s-security-platform.git
    targetRevision: main
    path: argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true